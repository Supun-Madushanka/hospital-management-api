server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:

          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/auth/**

          - id: user-service
            uri: lb://user-service
            predicates:
              - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true